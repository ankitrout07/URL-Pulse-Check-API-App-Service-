name: Build and Deploy Pulse-Check API

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # We zip the contents of the current directory into release.zip
      # Ensuring requirements.txt is at the top level of the ZIP
      - name: Zip artifact for deployment
        run: |
          zip -r release.zip . -x "infra/*" ".git/*" "venv/*" "__pycache__/*" ".github/*" ".terraform/*" "*.tfstate*" "tests/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: |
          mkdir -p deploy
          unzip release.zip -d deploy

      - name: "Deploy to Azure Web App"
        uses: azure/webapps-deploy@v3
        with:
          app-name: "PulseCheckAPI"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy